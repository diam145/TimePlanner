<!-- Team Detail Modal -->
<div id="teamDetailModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center p-4">
    <div class="bg-gray-800 rounded-xl shadow-2xl w-full max-w-6xl max-h-[90vh] overflow-y-auto">
        <!-- Modal Header -->
        <div id="teamDetailHeader" class="bg-gradient-to-r from-blue-600 to-blue-700 px-6 py-4 rounded-t-xl">
            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-3">
                    <i class="fa-solid fa-user-group text-2xl text-white"></i>
                    <h3 id="teamDetailTitle" class="text-xl font-bold text-white">Équipe</h3>
                </div>
                <div class="flex items-center space-x-2">
                    <button id="refreshTeamBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1 rounded text-sm transition-colors">
                        <i class="fa-solid fa-sync-alt mr-1"></i>Actualiser
                    </button>
                    <button id="editTeamBtn" class="bg-orange-600 hover:bg-orange-700 text-white px-3 py-1 rounded text-sm transition-colors">
                        <i class="fa-solid fa-edit mr-1"></i>Modifier
                    </button>
                    <button id="deleteTeamBtn" class="bg-red-600 hover:bg-red-700 text-white px-3 py-1 rounded text-sm transition-colors">
                        <i class="fa-solid fa-trash mr-1"></i>Supprimer
                    </button>
                    <button onclick="closeTeamDetailModal()" class="text-white hover:text-gray-200 transition-colors">
                        <i class="fa-solid fa-times text-xl"></i>
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Modal Content -->
        <div class="p-6">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <!-- Team Members Section -->
                <div class="bg-gray-700 rounded-lg p-4">
                    <div class="flex justify-between items-center mb-4">
                        <h4 class="text-lg font-semibold text-white flex items-center">
                            <i class="fa-solid fa-users mr-2 text-blue-400"></i>
                            Membres de l'équipe
                        </h4>
                        <button id="addMemberBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1 rounded text-sm transition-colors">
                            <i class="fa-solid fa-plus mr-1"></i>Ajouter
                        </button>
                    </div>
                    
                    <!-- Members List -->
                    <div id="teamMembersList" class="space-y-2 max-h-64 overflow-y-auto">
                        <!-- Members will be populated here -->
                    </div>
                </div>
                
                <!-- Team Shifts Section -->
                <div class="bg-gray-700 rounded-lg p-4">
                    <div class="flex justify-between items-center mb-4">
                        <h4 class="text-lg font-semibold text-white flex items-center">
                            <i class="fa-solid fa-clock mr-2 text-green-400"></i>
                            Horaires d'équipe
                        </h4>
                        <button id="addTeamShiftBtn" class="bg-green-600 hover:bg-green-700 text-white px-3 py-1 rounded text-sm transition-colors">
                            <i class="fa-solid fa-plus mr-1"></i>Ajouter
                        </button>
                    </div>
                    
                    <!-- Shifts List -->
                    <div id="teamShiftsList" class="space-y-2 max-h-64 overflow-y-auto">
                        <!-- Shifts will be populated here -->
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
