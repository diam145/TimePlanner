<!-- Day Schedule Modal -->
<div id="dayScheduleModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center p-4">
    <div class="bg-gray-800 rounded-xl shadow-2xl w-full max-w-md">
        <!-- Modal Header -->
        <div class="bg-gradient-to-r from-indigo-600 to-indigo-700 px-6 py-4 rounded-t-xl">
            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-3">
                    <i class="fa-solid fa-calendar-day text-2xl text-white"></i>
                    <h3 class="text-xl font-bold text-white">
                        <span id="dayScheduleTitle"></span>
                    </h3>
                </div>
                <button onclick="closeDayScheduleModal()" class="text-white hover:text-gray-200 transition-colors">
                    <i class="fa-solid fa-times text-xl"></i>
                </button>
            </div>
        </div>
        
        <!-- Modal Content -->
        <div id="dayScheduleContent" class="p-6">
            <!-- Content will be populated by JavaScript -->
        </div>
    </div>
</div>
