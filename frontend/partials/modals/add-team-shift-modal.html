<!-- Add Team Shift Modal -->
<div id="addTeamShiftModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center p-4">
    <div class="bg-gray-800 rounded-xl shadow-2xl w-full max-w-lg">
        <!-- Modal Header -->
        <div class="bg-gradient-to-r from-green-600 to-green-700 px-6 py-4 rounded-t-xl">
            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-3">
                    <i class="fa-solid fa-clock text-2xl text-white"></i>
                    <h3 class="text-xl font-bold text-white">Ajouter Horaire d'Équipe</h3>
                </div>
                <button onclick="closeAddTeamShiftModal()" class="text-white hover:text-gray-200 transition-colors">
                    <i class="fa-solid fa-times text-xl"></i>
                </button>
            </div>
        </div>
        
        <!-- Modal Content -->
        <form id="addTeamShiftForm" class="p-6">
            <div class="space-y-4">
                <!-- Shift Name -->
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Nom du poste</label>
                    <input type="text" id="shiftName" required 
                           class="w-full bg-gray-700 text-white px-4 py-2 rounded-lg border border-gray-600 focus:border-blue-400 focus:outline-none"
                           placeholder="ex: Service de Nuit">
                </div>
                
                <!-- Start and End Time -->
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">Heure de début</label>
                        <input type="time" id="shiftStartTime" required 
                               class="w-full bg-gray-700 text-white px-4 py-2 rounded-lg border border-gray-600 focus:border-blue-400 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">Heure de fin</label>
                        <input type="time" id="shiftEndTime" required 
                               class="w-full bg-gray-700 text-white px-4 py-2 rounded-lg border border-gray-600 focus:border-blue-400 focus:outline-none">
                    </div>
                </div>
                
                <!-- Frequency -->
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Fréquence de travail</label>
                    <select id="shiftFrequency" class="w-full bg-gray-700 text-white px-4 py-2 rounded-lg border border-gray-600 focus:border-blue-400 focus:outline-none">
                        <option value="1">Tous les jours</option>
                        <option value="2">Tous les 2 jours</option>
                        <option value="3">Tous les 3 jours</option>
                        <option value="4">Tous les 4 jours</option>
                        <option value="5">Tous les 5 jours</option>
                        <option value="7">Toutes les semaines</option>
                    </select>
                </div>
                
                <!-- Start Date -->
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Date de début</label>
                    <input type="date" id="shiftStartDate" required 
                           class="w-full bg-gray-700 text-white px-4 py-2 rounded-lg border border-gray-600 focus:border-blue-400 focus:outline-none">
                </div>
                
                <!-- End Date (Optional) -->
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Date de fin (optionnel)</label>
                    <input type="date" id="shiftEndDate" 
                           class="w-full bg-gray-700 text-white px-4 py-2 rounded-lg border border-gray-600 focus:border-blue-400 focus:outline-none">
                </div>
            </div>
            
            <!-- Action Buttons -->
            <div class="flex justify-end space-x-3 pt-6 border-t border-gray-600 mt-6">
                <button type="button" onclick="closeAddTeamShiftModal()" class="px-4 py-2 bg-gray-600 hover:bg-gray-700 text-white rounded-lg transition-colors">
                    Annuler
                </button>
                <button type="submit" class="px-4 py-2 bg-green-600 hover:bg-green-700 text-white rounded-lg transition-colors">
                    Créer l'horaire
                </button>
            </div>
        </form>
    </div>
</div>
