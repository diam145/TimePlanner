<!-- Edit Employee Info Modal -->
<div id="editEmployeeModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center p-4">
    <div class="bg-gray-800 rounded-xl shadow-2xl w-full max-w-md">
        <!-- Modal Header -->
        <div class="bg-gradient-to-r from-emerald-600 to-emerald-700 px-6 py-4 rounded-t-xl">
            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-3">
                    <i class="fa-solid fa-user-edit text-2xl text-white"></i>
                    <h3 class="text-xl font-bold text-white">Modifier Employé</h3>
                </div>
                <button onclick="closeEditEmployeeModal()" class="text-white hover:text-gray-200 transition-colors">
                    <i class="fa-solid fa-times text-xl"></i>
                </button>
            </div>
        </div>

        <!-- Modal Content -->
        <form id="editEmployeeForm" class="p-6">
            <div class="space-y-5">
                <input type="hidden" id="editEmployeeId" name="employeeId">
                
                <div class="form-field">
                    <label class="block text-sm font-medium text-gray-300 mb-2 flex items-center">
                        <i class="fa-solid fa-user text-blue-400 mr-2"></i>
                        Nom de l'employé
                    </label>
                    <input type="text" id="editEmployeeName" name="name" required 
                           class="w-full bg-gray-700 text-white px-4 py-3 rounded-lg border border-gray-600 focus:border-blue-400 focus:outline-none transition-all duration-200"
                           placeholder="Entrez le nom complet">
                </div>
                
                <div class="form-field">
                    <label class="block text-sm font-medium text-gray-300 mb-2 flex items-center">
                        <i class="fa-solid fa-briefcase text-blue-400 mr-2"></i>
                        Statut de l'employé
                    </label>
                    <select id="editEmployeeStatus" name="status" required 
                            class="w-full bg-gray-700 text-white px-4 py-3 rounded-lg border border-gray-600 focus:border-blue-400 focus:outline-none transition-all duration-200">
                        <option value="employee">Employé interne</option>
                        <option value="external">Employé externe</option>
                    </select>
                </div>

                <!-- Action Buttons -->
                <div class="flex flex-col sm:flex-row space-y-2 sm:space-y-0 sm:space-x-3 pt-4 border-t border-gray-600">
                    <button type="submit" class="flex-1 bg-gradient-to-r from-emerald-600 to-emerald-700 hover:from-emerald-700 hover:to-emerald-800 text-white px-6 py-3 rounded-lg transition-all duration-200 flex items-center justify-center font-medium">
                        <i class="fa-solid fa-save mr-2"></i>
                        Sauvegarder
                    </button>
                    <button type="button" onclick="closeEditEmployeeModal()" class="flex-1 bg-gray-600 hover:bg-gray-700 text-white px-6 py-3 rounded-lg transition-colors flex items-center justify-center font-medium">
                        <i class="fa-solid fa-times mr-2"></i>
                        Annuler
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>
