<!-- Add Employee Schedule Modal -->
<div id="addScheduleModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center p-4">
    <div class="bg-gray-800 rounded-xl shadow-2xl w-full max-w-3xl max-h-[90vh] overflow-y-auto">
        <!-- Modal Header -->
        <div class="bg-gradient-to-r from-blue-600 to-blue-700 px-6 py-4 rounded-t-xl">
            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-3">
                    <i class="fa-solid fa-calendar-plus text-2xl text-white"></i>
                    <h3 class="text-xl font-bold text-white">Ajouter Horaire Employé</h3>
                </div>
                <button onclick="closeAddScheduleModal()" class="text-white hover:text-gray-200 transition-colors">
                    <i class="fa-solid fa-times text-xl"></i>
                </button>
            </div>
        </div>

        <!-- Modal Content -->
        <form id="addScheduleForm" class="p-6">
            <div class="space-y-6">
                <input type="hidden" id="employeeId" name="employeeId">
                
                <!-- Date Interval Section -->
                <div class="bg-gray-700 rounded-lg p-5">
                    <h4 class="text-lg font-semibold text-white mb-4 flex items-center">
                        <i class="fa-solid fa-calendar-days text-blue-400 mr-2"></i>
                        Période d'application
                    </h4>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-300 mb-2">
                                <i class="fa-solid fa-play text-green-400 mr-1"></i>
                                Date de début
                            </label>
                            <input type="date" id="startDate" name="startDate" required 
                                   class="w-full bg-gray-600 text-white px-4 py-3 rounded-lg border border-gray-500 focus:border-blue-400 focus:outline-none transition-colors">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-300 mb-2">
                                <i class="fa-solid fa-stop text-red-400 mr-1"></i>
                                Date de fin
                            </label>
                            <input type="date" id="endDate" name="endDate" required 
                                   class="w-full bg-gray-600 text-white px-4 py-3 rounded-lg border border-gray-500 focus:border-blue-400 focus:outline-none transition-colors">
                        </div>
                    </div>
                    <p class="text-gray-400 text-sm mt-2">
                        <i class="fa-solid fa-info-circle mr-1"></i>
                        L'horaire sera répété chaque semaine durant cette période
                    </p>
                </div>

                <!-- Weekly Schedule Section -->
                <div class="bg-gray-700 rounded-lg p-5">
                    <h4 class="text-lg font-semibold text-white mb-4 flex items-center">
                        <i class="fa-solid fa-clock text-blue-400 mr-2"></i>
                        Horaire hebdomadaire
                    </h4>
                    <div id="weeklySchedule" class="space-y-3">
                        <!-- Days will be populated by JavaScript -->
                    </div>
                    <div class="mt-4 p-3 bg-blue-900 bg-opacity-30 rounded-lg border border-blue-600">
                        <p class="text-blue-200 text-sm flex items-center">
                            <i class="fa-solid fa-lightbulb mr-2"></i>
                            Cochez les jours de travail et définissez les heures correspondantes
                        </p>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="flex flex-col sm:flex-row space-y-2 sm:space-y-0 sm:space-x-3 pt-4 border-t border-gray-600">
                    <button type="submit" class="flex-1 bg-gradient-to-r from-green-600 to-green-700 hover:from-green-700 hover:to-green-800 text-white px-6 py-3 rounded-lg transition-all duration-200 flex items-center justify-center font-medium">
                        <i class="fa-solid fa-plus mr-2"></i>
                        Ajouter l'horaire
                    </button>
                    <button type="button" onclick="closeAddScheduleModal()" class="flex-1 bg-gray-600 hover:bg-gray-700 text-white px-6 py-3 rounded-lg transition-colors flex items-center justify-center font-medium">
                        <i class="fa-solid fa-times mr-2"></i>
                        Annuler
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>
