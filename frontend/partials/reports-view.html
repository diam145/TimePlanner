<!-- Reports View -->
<div id="view-reports" class="view hidden flex-1 flex flex-col">
    <!-- Reports Header -->
    <div class="header-gradient p-6 border-b border-gray-600">
        <div class="flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <i class="fa-solid fa-chart-bar text-2xl text-blue-400"></i>
                <h2 class="text-2xl font-bold text-white">Gestion des Rapports</h2>
            </div>
            <button id="refreshReports" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition-colors flex items-center space-x-2">
                <i class="fa-solid fa-refresh"></i>
                <span>Actualiser</span>
            </button>
        </div>
    </div>

    <!-- Reports Content -->
    <div class="flex-1 overflow-hidden">
        <div class="h-full overflow-y-auto p-6">
            <!-- Archive Files Section -->
            <div class="bg-gray-800 rounded-lg border border-gray-600 p-6">
                <h3 class="text-xl font-semibold text-white mb-4 flex items-center">
                    <i class="fa-solid fa-archive mr-2 text-blue-400"></i>
                    Fichiers d'Archive
                </h3>
                
                <!-- Loading State -->
                <div id="reportsLoading" class="text-center py-8">
                    <i class="fa-solid fa-spinner fa-spin text-2xl text-blue-400 mb-2"></i>
                    <p class="text-gray-400">Chargement des rapports...</p>
                </div>

                <!-- Reports Table -->
                <div id="reportsTableContainer" class="hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm">
                            <thead>
                                <tr class="bg-gray-700 border-b border-gray-600">
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-300 uppercase tracking-wider">
                                        <i class="fa-solid fa-file-excel mr-2"></i>Nom du Fichier
                                    </th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-300 uppercase tracking-wider">
                                        <i class="fa-solid fa-calendar mr-2"></i>Date de Modification
                                    </th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-300 uppercase tracking-wider">
                                        <i class="fa-solid fa-hdd mr-2"></i>Taille
                                    </th>
                                    <th class="px-4 py-3 text-center text-xs font-medium text-gray-300 uppercase tracking-wider">
                                        <i class="fa-solid fa-cog mr-2"></i>Actions
                                    </th>
                                </tr>
                            </thead>
                            <tbody id="reportsTableBody" class="divide-y divide-gray-600">
                                <!-- Reports will be populated here -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Empty State -->
                <div id="reportsEmpty" class="hidden text-center py-8">
                    <i class="fa-solid fa-folder-open text-4xl text-gray-500 mb-4"></i>
                    <p class="text-gray-400 text-lg">Aucun rapport trouvé</p>
                    <p class="text-gray-500 text-sm mt-2">Exportez des rapports depuis la vue "Gestion des Horaires" pour les voir ici.</p>
                </div>
            </div>
        </div>
    </div>
</div>
