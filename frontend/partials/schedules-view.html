<!-- Schedules Management View -->
<div id="view-schedules" class="view hidden flex-1 flex flex-col overflow-hidden">
    <!-- Header -->
    <div class="bg-gray-800 px-8 py-6 border-b border-gray-700">
        <div class="flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <i class="fa-solid fa-clock text-2xl text-blue-400"></i>
                <h2 class="text-2xl font-bold text-white">Gestion des Horaires</h2>
            </div>
            <div class="flex items-center space-x-4">
                <!-- Week Selector -->
                <div class="flex items-center space-x-2">
                    <i class="fa-solid fa-calendar text-red-400"></i>
                    <label class="text-gray-300 text-sm font-medium">Sélectionnez la semaine:</label>
                    <input 
                        type="date" 
                        id="weekSelector"
                        class="bg-gray-700 text-white px-3 py-2 rounded-lg border border-gray-600 focus:border-blue-400 focus:outline-none"
                    >
                </div>
            </div>
        </div>
    </div>
    
    <!-- Table Container -->
    <div class="flex-1 px-4 pt-4">
        <div class="bg-gray-800 rounded-lg shadow-lg overflow-hidden table-container force-scrollbar">
            <table class="w-full schedule-table">
                <thead class="bg-gray-700 sticky top-0 z-30">
                    <tr>
                        <th class="px-4 py-3 text-left text-sm font-semibold text-gray-200 uppercase tracking-wider">Name</th>
                        <th class="px-4 py-3 text-center text-sm font-semibold text-gray-200 uppercase tracking-wider">
                            <div>Dimanche</div>
                            <div id="sunday-date" class="text-xs font-normal text-gray-400"></div>
                        </th>
                        <th class="px-4 py-3 text-center text-sm font-semibold text-gray-200 uppercase tracking-wider">
                            <div>Lundi</div>
                            <div id="monday-date" class="text-xs font-normal text-gray-400"></div>
                        </th>
                        <th class="px-4 py-3 text-center text-sm font-semibold text-gray-200 uppercase tracking-wider">
                            <div>Mardi</div>
                            <div id="tuesday-date" class="text-xs font-normal text-gray-400"></div>
                        </th>
                        <th class="px-4 py-3 text-center text-sm font-semibold text-gray-200 uppercase tracking-wider">
                            <div>Mercredi</div>
                            <div id="wednesday-date" class="text-xs font-normal text-gray-400"></div>
                        </th>
                        <th class="px-4 py-3 text-center text-sm font-semibold text-gray-200 uppercase tracking-wider">
                            <div>Jeudi</div>
                            <div id="thursday-date" class="text-xs font-normal text-gray-400"></div>
                        </th>
                        <th class="px-4 py-3 text-center text-sm font-semibold text-gray-200 uppercase tracking-wider">
                            <div>Vendredi</div>
                            <div id="friday-date" class="text-xs font-normal text-gray-400"></div>
                        </th>
                        <th class="px-4 py-3 text-center text-sm font-semibold text-gray-200 uppercase tracking-wider">
                            <div>Samedi</div>
                            <div id="saturday-date" class="text-xs font-normal text-gray-400"></div>
                        </th>
                        <th class="px-4 py-3 text-center text-sm font-semibold text-gray-200 uppercase tracking-wider">TOTAL</th>
                        <th class="px-4 py-3 text-center text-sm font-semibold text-gray-200 uppercase tracking-wider">Actions</th>
                    </tr>
                </thead>
                <tbody id="schedules-table-body" class="divide-y divide-gray-700">
                    <!-- Schedule rows will be populated here -->
                </tbody>
            </table>
        </div>
    </div>
    
    <!-- Fixed Export Button at Bottom -->
    <div class="bg-gray-800 border-t border-gray-700 p-6 fixed-export-bar">
        <button id="exportExcel" class="bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-lg transition-colors flex items-center text-lg font-medium">
            <i class="fa-solid fa-file-excel mr-3"></i>
            Exportez sur Excel
        </button>
    </div>
</div>
