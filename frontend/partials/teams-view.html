<!-- Teams Management View -->
<div id="view-teams" class="view hidden flex-1 flex flex-col">
    <!-- Teams Header -->
    <div class="header-gradient p-6 border-b border-gray-600">
        <div class="flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <i class="fa-solid fa-user-group text-2xl text-blue-400"></i>
                <h2 class="text-2xl font-bold text-white">Gestion des Équipes</h2>
            </div>
            <button id="createTeamBtn" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg transition-colors flex items-center space-x-2">
                <i class="fa-solid fa-plus"></i>
                <span>Créer Équipe</span>
            </button>
        </div>
    </div>

    <!-- Teams Content -->
    <div class="flex-1 overflow-hidden">
        <div class="h-full overflow-y-auto p-6">
            <!-- Teams Grid -->
            <div id="teamsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Teams will be populated here -->
            </div>

            <!-- Empty State -->
            <div id="teamsEmpty" class="hidden text-center py-16">
                <i class="fa-solid fa-user-group text-6xl text-gray-500 mb-4"></i>
                <h3 class="text-xl font-semibold text-gray-400 mb-2">Aucune équipe créée</h3>
                <p class="text-gray-500 mb-6">Créez votre première équipe pour commencer à organiser vos employés.</p>
                <button onclick="openCreateTeamModal()" class="bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-lg transition-colors flex items-center space-x-2 mx-auto">
                    <i class="fa-solid fa-plus"></i>
                    <span>Créer ma première équipe</span>
                </button>
            </div>
        </div>
    </div>
</div>
