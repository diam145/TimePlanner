<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimePlanner - Erreur</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }
        
        .error-container {
            text-align: center;
            max-width: 600px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        
        .error-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        
        .error-title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 16px;
        }
        
        .error-message {
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 30px;
            opacity: 0.9;
        }
        
        .retry-button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        
        .retry-button:hover {
            background: #45a049;
        }
        
        .loading {
            display: none;
            margin-top: 20px;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-icon">⚠️</div>
        <div class="error-title">Erreur de connexion</div>
        <div class="error-message">
            Le serveur TimePlanner n'a pas pu démarrer correctement.<br>
            Veuillez vérifier que tous les composants sont installés et réessayer.
        </div>
        <button class="retry-button" onclick="retryConnection()">Réessayer</button>
        <div class="loading">
            <div class="spinner"></div>
            <p>Redémarrage en cours...</p>
        </div>
    </div>

    <script>
        function retryConnection() {
            const button = document.querySelector('.retry-button');
            const loading = document.querySelector('.loading');
            
            button.style.display = 'none';
            loading.style.display = 'block';
            
            // Reload the window after a short delay
            setTimeout(() => {
                window.location.reload();
            }, 2000);
        }
        
        // Auto-retry every 30 seconds
        setInterval(() => {
            // Check if we can connect to the backend
            fetch('http://127.0.0.1:5001/api/workers')
                .then(response => {
                    if (response.ok) {
                        window.location.href = 'http://127.0.0.1:5001';
                    }
                })
                .catch(() => {
                    // Still can't connect, keep waiting
                });
        }, 30000);
    </script>
</body>
</html>
